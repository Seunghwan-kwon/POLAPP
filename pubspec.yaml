name: pol_app
description: "capston project named polapp"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_naver_map: ^1.4.4
  geolocator: ^14.0.2
  socket_io_client: ^3.1.4
  web: ^1.1.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/POL_APP_LOGO.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/police_logo.png